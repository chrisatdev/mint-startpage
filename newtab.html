<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Mint Startpage</title>
    <link rel="stylesheet" href="newtab.css" />
  </head>
  <body>
    <header class="header">
      <a
        href="https://github.com/chrisatdev/mint-startpage"
        target="_blank"
        title="Mint Startpage"
        rel="noopener noreferrer"
      >
        <img src="assets/icons/icon128.png" width="24" />
      </a>

      <div class="search-container">
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Search links... (Enter to search Google)"
        />
      </div>

      <div class="header-right">
        <button id="addGroupBtn">+ Group</button>
        <button id="openSettings" title="Settings">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="3" />
            <path
              d="M12 1v6m0 6v6M1 12h6m6 0h6m-2.3-8.5l4.2 4.2M6.3 17.7l4.2 4.2m0-15.8l4.2-4.2M6.3 6.3l4.2-4.2"
            />
          </svg>
        </button>
      </div>
    </header>

    <div class="app-layout">
      <nav class="sidebar" id="sidebar">
        <div class="sidebar-tabs" id="sidebarTabs"></div>
        <div class="sidebar-footer">
          <a
            href="https://github.com/chrisatdev/mint-startpage"
            target="_blank"
            rel="noopener noreferrer"
            class="sidebar-footer-link"
          >Mint Startpage</a>
          <span class="sidebar-footer-version">v1.2.0</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
      </nav>

      <main class="main-content" id="mainContent"></main>
    </div>


    <!-- Modal for add/edit group -->
    <div class="modal-overlay" id="groupModal">
      <div class="modal">
        <h2 id="groupModalTitle">New Group</h2>
        <div class="modal-field">
          <label for="groupTitleInput">Group name</label>
          <input
            type="text"
            id="groupTitleInput"
            placeholder="e.g. Social Media"
          />
        </div>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-secondary" id="cancelGroupModal">
            Cancel
          </button>
          <button class="modal-btn modal-btn-primary" id="saveGroupModal">
            Save
          </button>
        </div>
      </div>
    </div>

    <!-- Modal for add/edit link -->
    <div class="modal-overlay" id="linkModal">
      <div class="modal">
        <h2 id="linkModalTitle">New Link</h2>
        <div class="modal-field">
          <label for="linkTitleInput">Title</label>
          <input type="text" id="linkTitleInput" placeholder="e.g. YouTube" />
        </div>
        <div class="modal-field">
          <label for="linkUrlInput">URL</label>
          <input
            type="url"
            id="linkUrlInput"
            placeholder="https://example.com"
          />
        </div>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-secondary" id="cancelLinkModal">
            Cancel
          </button>
          <button class="modal-btn modal-btn-primary" id="saveLinkModal">
            Save
          </button>
        </div>
      </div>
    </div>

    <!-- Keyboard shortcuts overlay -->
    <div class="shortcuts-overlay hidden" id="shortcutsOverlay">
      <div class="shortcuts-modal">
        <div class="shortcuts-header">
          <span>Keyboard Shortcuts</span>
          <button class="shortcuts-close" id="shortcutsClose">✕</button>
        </div>
        <div class="shortcuts-list">
          <div class="shortcut-row">
            <kbd>/</kbd>
            <span>Focus search</span>
          </div>
          <div class="shortcut-row">
            <kbd>Enter</kbd>
            <span>Search on Google</span>
          </div>
          <div class="shortcut-row">
            <kbd>Esc</kbd>
            <span>Clear search</span>
          </div>
          <div class="shortcut-row">
            <kbd>→</kbd>
            <span>Next group</span>
          </div>
          <div class="shortcut-row">
            <kbd>←</kbd>
            <span>Previous group</span>
          </div>
          <div class="shortcut-row">
            <kbd>?</kbd>
            <span>Show / hide this panel</span>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="newtab.js"></script>
  </body>
</html>
