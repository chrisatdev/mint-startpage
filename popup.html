<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Save to Mint</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup-header">
      <img src="assets/icons/icon128.png" width="18" />
      <span>Save to Mint Startpage</span>
    </div>

    <div class="popup-body" id="popupBody">
      <div class="field">
        <label for="linkTitle">Title</label>
        <input type="text" id="linkTitle" placeholder="Link title" />
      </div>
      <div class="field">
        <label for="linkUrl">URL</label>
        <input type="url" id="linkUrl" placeholder="https://..." />
      </div>
      <div class="field">
        <label for="groupSelect">Group</label>
        <select id="groupSelect">
          <option value="">— Select a group —</option>
        </select>
      </div>

      <button id="saveBtn">Save link</button>

      <div class="feedback hidden" id="feedback"></div>
    </div>

    <div class="popup-empty hidden" id="popupEmpty">
      <p>No groups yet.</p>
      <p>Open a new tab to create your first group.</p>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
